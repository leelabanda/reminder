<div class="layout">

  <!-- Header -->
  <header class="header">
    <div class="left-header">
      <button class="menu-btn" (click)="toggleSidebar()">
        ☰
      </button>

      <h2>DOB Tracker</h2>
    </div>

    <button class="logout-btn" (click)="logout()">
      Logout
    </button>
  </header>

  <!-- Overlay -->
  <div
    class="overlay"
    *ngIf="sidebarOpen"
    (click)="closeSidebarOnMobile()">
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.closed]="!sidebarOpen">

    <a
      routerLink="/father/events"
      routerLinkActive="active"
      (click)="closeSidebarOnMobile()">
      <span class="icon">🎂</span>
      <span class="text">Today's F-Events</span>
    </a>

    <a
      routerLink="/mother/events"
      routerLinkActive="active"
      (click)="closeSidebarOnMobile()">
      <span class="icon">🎉</span>
      <span class="text">Today's M-Events</span>
    </a>

    <!-- Father -->
    <div class="menu-item">

      <div class="menu-title" (click)="toggleFatherMenu()">
        <span>👨 Father Dashboard</span>
        <span>{{ fatherOpen ? '▼' : '►' }}</span>
      </div>

      <div class="submenu" *ngIf="fatherOpen">

        <a
          routerLink="/father/dashboard"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()">
          📝 Dashboard
        </a>

        <a
          routerLink="/father/add"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()">
          👥 Add Person
        </a>

        <a
          routerLink="/father/users"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()">
          👥 Manage Users
        </a>

      </div>

    </div>

    <!-- Mother -->
    <div class="menu-item">

      <div class="menu-title" (click)="toggleMotherMenu()">
        <span>👩 Mother Dashboard</span>
        <span>{{ motherOpen ? '▼' : '►' }}</span>
      </div>

      <div class="submenu" *ngIf="motherOpen">

        <a
          routerLink="/mother/dashboard"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()">
          📝 Dashboard
        </a>

        <a
          routerLink="/mother/add"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()">
          👥 Add Person
        </a>

        <!-- <a
          routerLink="/mother/calendar"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()">
          📆 Calendar
        </a> -->

        <a
          routerLink="/mother/users"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()">
          👥 Manage Users
        </a>

      </div>

    </div>
            <a
          routerLink="/calendar"
          routerLinkActive="active"
          (click)="closeSidebarOnMobile()">
          📆 Calendar
        </a>
    <a
      routerLink="/status"
      routerLinkActive="active"
      (click)="closeSidebarOnMobile()">
      📊 Status
    </a>

    <a
      routerLink="/import"
      routerLinkActive="active"
      (click)="closeSidebarOnMobile()">
      📂 Import Excel
    </a>

    <a
      routerLink="/profile"
      routerLinkActive="active"
      (click)="closeSidebarOnMobile()">
      👤 Profile
    </a>

  </aside>

  <!-- Main Content -->
  <main
    class="content"
    [class.full]="!sidebarOpen"
    (click)="closeSidebarOnMobile()">

    <router-outlet></router-outlet>

  </main>

</div>
